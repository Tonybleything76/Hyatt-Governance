shadow:0 0 0 1px #4A78AB;}\n  .rk-low{background:#E7F3EC;color:#2E7D52;}\n  .rk-med{background:#FBF1DD;color:#B7791F;}\n  .rk-high{background:#FBE9E8;color:#C23934;}\n  .gv-linked{background:#E7F3EC;color:#2E7D52;}\n  .gv-pending{background:#FBF1DD;color:#B7791F;}\n  .gv-needed{background:#F3F2F1;color:#8A9097;}\n  .pt-yes{color:#2E7D52;}\n  .pt-no{color:#C23934;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width:1280px;margin:0 auto;background:#F3F2F1;min-height:100vh;box-shadow:0 0 0 1px #E4E2E0;\">\n\n  <!-- M365 suite bar -->\n  <div style=\"height:48px;background:#2A4D6E;display:flex;align-items:center;justify-content:space-between;padding:0 16px;\">\n    <div style=\"display:flex;align-items:center;gap:14px;\">\n      <div style=\"display:grid;grid-template-columns:repeat(3,4px);grid-gap:2px;cursor:pointer;\">\n        <span style=\"width:4px;height:4px;background:#cdd9e6;\"><\u002Fspan><span style=\"width:4px;height:4px;background:#cdd9e6;\"><\u002Fspan><span style=\"width:4px;height:4px;background:#cdd9e6;\"><\u002Fspan><span style=\"width:4px;height:4px;background:#cdd9e6;\"><\u002Fspan><span style=\"width:4px;height:4px;background:#cdd9e6;\"><\u002Fspan><span style=\"width:4px;height:4px;background:#cdd9e6;\"><\u002Fspan><span style=\"width:4px;height:4px;background:#cdd9e6;\"><\u002Fspan><span style=\"width:4px;height:4px;background:#cdd9e6;\"><\u002Fspan><span style=\"width:4px;height:4px;background:#cdd9e6;\"><\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"color:#fff;font:600 15px 'Segoe UI',Arial,sans-serif;\">Hyatt Connect<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:18px;color:#cdd9e6;font:400 13px 'Segoe UI',Arial,sans-serif;\">\n      <span>Search<\u002Fspan><span>🔔<\u002Fspan><span>⚙<\u002Fspan><span>?<\u002Fspan>\n      <span style=\"width:28px;height:28px;border-radius:50%;background:#4A78AB;color:#fff;display:flex;align-items:center;justify-content:center;font:600 12px 'Segoe UI',Arial,sans-serif;\">RL<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Hub bar -->\n  <div style=\"height:52px;background:#fff;border-bottom:1px solid #E4E2E0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:20;\">\n    <div style=\"display:flex;align-items:center;gap:26px;\">\n      <div style=\"display:flex;align-items:center;gap:10px;cursor:pointer;\" onclick=\"{{ goHome }}\">\n        <div style=\"width:30px;height:30px;border-radius:4px;background:#4A78AB;color:#fff;display:flex;align-items:center;justify-content:center;font:700 13px 'Segoe UI',Arial,sans-serif;\">AI<\u002Fdiv>\n        <span style=\"font:700 15px 'Segoe UI',Arial,sans-serif;color:#242424;\">AI Tool Governance<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:22px;\">\n        <span class=\"navlink {{ homeActive }}\" onclick=\"{{ goHome }}\">Home<\u002Fspan>\n        <span class=\"navlink {{ libActive }}\" onclick=\"{{ goLibrary }}\">Use Case Library<\u002Fspan>\n        <span class=\"navlink {{ govActive }}\" onclick=\"{{ goGov }}\">Governance Log<\u002Fspan>\n        <span class=\"navlink {{ enbActive }}\" onclick=\"{{ goEnablement }}\">Enablement<\u002Fspan>\n        <span class=\"navlink {{ metActive }}\" onclick=\"{{ goMetrics }}\">Metrics<\u002Fspan>\n        <span class=\"navlink\">Support<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:16px;color:#5B6470;font:400 12.5px 'Segoe UI',Arial,sans-serif;\"><span>☆ Following<\u002Fspan><span>↗ Share<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===================== HOME ===================== -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <div>\n    <!-- hero -->\n    <div style=\"position:relative;height:400px;\">\n      <image-slot id=\"demo-hero\" style=\"position:absolute;inset:0;width:100%;height:100%;\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop a Hyatt property / colleague photo\"><\u002Fimage-slot>\n      <div style=\"position:absolute;inset:0;background:linear-gradient(90deg,rgba(20,40,62,.88) 0%,rgba(20,40,62,.66) 50%,rgba(20,40,62,.16) 100%);\"><\u002Fdiv>\n      <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 64px;max-width:780px;\">\n        <span style=\"font:600 12.5px 'Segoe UI',Arial,sans-serif;letter-spacing:.16em;text-transform:uppercase;color:#9DC0E4;margin-bottom:14px;\">Hyatt AI Tool Governance<\u002Fspan>\n        <h1 style=\"margin:0 0 16px;font:700 42px/1.12 'Segoe UI',Arial,sans-serif;color:#fff;letter-spacing:-.01em;\">Share what's working.<br>Help Hyatt govern AI responsibly.<\u002Fh1>\n        <p style=\"margin:0 0 28px;font:400 16px/1.55 'Segoe UI',Arial,sans-serif;color:#dce6f1;max-width:560px;\">AI moves fastest when colleagues learn from each other. Share a short story about a GPT or Skill you built or used — your AI Enthusiast helps review, tag, and route it.<\u002Fp>\n        <div style=\"display:flex;gap:14px;align-items:center;\">\n          <button class=\"spbtn\" onclick=\"{{ goSubmit }}\">＋ Submit an AI use case story<\u002Fbutton>\n          <button class=\"spbtn2\" onclick=\"{{ goGov }}\">🛡 Run a governance review<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- governance note -->\n    <div style=\"background:#FBF1DD;border-bottom:1px solid #F0E2BE;padding:11px 64px;display:flex;align-items:center;gap:10px;\">\n      <span style=\"color:#B7791F;font-size:14px;\">⚑<\u002Fspan>\n      <span style=\"font:400 13px 'Segoe UI',Arial,sans-serif;color:#6B5410;\">High-risk tools must be escalated to the AI Council before broad reuse. Low- and medium-risk tools may be self-approved after Enthusiast review.<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- CoE lifecycle -->\n    <div style=\"background:#fff;border-bottom:1px solid #E4E2E0;padding:32px 64px 36px;\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;\">\n        <div>\n          <div style=\"font:600 11px 'Segoe UI',Arial,sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#4A78AB;margin-bottom:5px;\">The Hyatt AI Center of Excellence<\u002Fdiv>\n          <h2 style=\"margin:0;font:700 22px 'Segoe UI',Arial,sans-serif;\">From idea to adopted, in four steps<\u002Fh2>\n        <\u002Fdiv>\n        <span style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;max-width:320px;text-align:right;\">Lightweight by design — risk-based review, not a single heavy intake.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:stretch;\">\n        <div class=\"card\" onclick=\"{{ goSubmit }}\" style=\"flex:1;background:#F7FAFD;border:1px solid #E1EAF3;border-radius:6px;padding:18px;\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px;\"><span style=\"width:26px;height:26px;border-radius:50%;background:#4A78AB;color:#fff;font:700 12px 'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;\">1<\u002Fspan><span style=\"font-size:17px;\">✍️<\u002Fspan><\u002Fdiv>\n          <div style=\"font:700 15px 'Segoe UI',Arial,sans-serif;margin-bottom:5px;\">Intake<\u002Fdiv>\n          <p style=\"margin:0 0 10px;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">A colleague shares a short story about a GPT or Skill they built or used.<\u002Fp>\n          <span class=\"lnk\" style=\"font-size:12px;\">Submit a story →<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;padding:0 10px;color:#9DB6CE;font-size:18px;\">→<\u002Fdiv>\n        <div class=\"card\" onclick=\"{{ goGov }}\" style=\"flex:1;background:#F2F5F8;border:1px solid #DCE4EC;border-top:3px solid #2A4D6E;border-radius:6px;padding:18px;\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px;\"><span style=\"width:26px;height:26px;border-radius:50%;background:#2A4D6E;color:#fff;font:700 12px 'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;\">2<\u002Fspan><span style=\"font-size:17px;\">🛡<\u002Fspan><span style=\"background:#E9EEF3;color:#2A4D6E;font:600 8.5px 'Segoe UI',Arial,sans-serif;letter-spacing:.04em;padding:2px 6px;border-radius:8px;margin-left:auto;\">🔒 RESTRICTED<\u002Fspan><\u002Fdiv>\n          <div style=\"font:700 15px 'Segoe UI',Arial,sans-serif;margin-bottom:5px;\">Review &amp; route<\u002Fdiv>\n          <p style=\"margin:0 0 10px;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">An AI Enthusiast runs the Risk Assessor and routes low, medium, or high risk.<\u002Fp>\n          <span class=\"lnk\" style=\"font-size:12px;\">Open Governance Log →<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;padding:0 10px;color:#9DB6CE;font-size:18px;\">→<\u002Fdiv>\n        <div class=\"card\" onclick=\"{{ goEnablement }}\" style=\"flex:1;background:#F7FAFD;border:1px solid #E1EAF3;border-radius:6px;padding:18px;\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px;\"><span style=\"width:26px;height:26px;border-radius:50%;background:#4A78AB;color:#fff;font:700 12px 'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;\">3<\u002Fspan><span style=\"font-size:17px;\">🧩<\u002Fspan><\u002Fdiv>\n          <div style=\"font:700 15px 'Segoe UI',Arial,sans-serif;margin-bottom:5px;\">Build<\u002Fdiv>\n          <p style=\"margin:0 0 10px;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Reusable templates, Skills, and prompt patterns help teams build it well.<\u002Fp>\n          <span class=\"lnk\" style=\"font-size:12px;\">Go to Enablement →<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;padding:0 10px;color:#9DB6CE;font-size:18px;\">→<\u002Fdiv>\n        <div class=\"card\" onclick=\"{{ goLibrary }}\" style=\"flex:1;background:#FBF6EC;border:1px solid #F0E6D0;border-radius:6px;padding:18px;\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px;\"><span style=\"width:26px;height:26px;border-radius:50%;background:#C77F0A;color:#fff;font:700 12px 'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;\">4<\u002Fspan><span style=\"font-size:17px;\">📣<\u002Fspan><\u002Fdiv>\n          <div style=\"font:700 15px 'Segoe UI',Arial,sans-serif;margin-bottom:5px;\">Adopt<\u002Fdiv>\n          <p style=\"margin:0 0 10px;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Wins are tagged, spotlighted, and reused by other teams across Hyatt.<\u002Fp>\n          <span class=\"lnk\" style=\"font-size:12px;\">Browse the Library →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:44px 64px 60px;\">\n      <!-- two layers / two actions -->\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;\">\n        <h2 style=\"margin:0;font:700 23px 'Segoe UI',Arial,sans-serif;\">One program, two connected layers<\u002Fh2>\n        <span style=\"font:400 13px 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Linked by a shared Tool ID / Story ID — never merged into one form<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:50px;\">\n        <div class=\"card\" onclick=\"{{ goLibrary }}\" style=\"background:#fff;border:1px solid #E4E2E0;border-top:4px solid #4A78AB;border-radius:4px;padding:26px;\">\n          <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:12px;\">\n            <div style=\"width:42px;height:42px;border-radius:6px;background:#EAF1F8;color:#4A78AB;display:flex;align-items:center;justify-content:center;font-size:21px;\">📖<\u002Fdiv>\n            <div><div style=\"font:700 17px 'Segoe UI',Arial,sans-serif;\">Use Case Library<\u002Fdiv><div style=\"font:400 12px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Layer 1 · Story Catalog · broad internal<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0 0 16px;font:400 14px/1.55 'Segoe UI',Arial,sans-serif;color:#444;\">A searchable, celebrate-able collection of GPT and Skill use cases. Should feel like sharing a win.<\u002Fp>\n          <span class=\"lnk\" style=\"font-size:13.5px;\">Browse the library →<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"card\" onclick=\"{{ goGov }}\" style=\"background:#fff;border:1px solid #E4E2E0;border-top:4px solid #2A4D6E;border-radius:4px;padding:26px;\">\n          <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:12px;\">\n            <div style=\"width:42px;height:42px;border-radius:6px;background:#E9EEF3;color:#2A4D6E;display:flex;align-items:center;justify-content:center;font-size:21px;\">🛡<\u002Fdiv>\n            <div><div style=\"font:700 17px 'Segoe UI',Arial,sans-serif;display:flex;align-items:center;gap:8px;\">Governance Log <span style=\"background:#E9EEF3;color:#2A4D6E;font:600 9.5px 'Segoe UI',Arial,sans-serif;letter-spacing:.05em;padding:2px 7px;border-radius:9px;\">🔒 RESTRICTED<\u002Fspan><\u002Fdiv><div style=\"font:400 12px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Layer 2 · Risk &amp; Approval Tracker<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:0 0 16px;font:400 14px/1.55 'Segoe UI',Arial,sans-serif;color:#444;\">A structured audit trail of tools reviewed, risk classification, routing, and approval status — for AI Enthusiasts &amp; the AI Council.<\u002Fp>\n          <span class=\"lnk\" style=\"font-size:13.5px;\">Open the Governance Log →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- spotlight -->\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"color:#C77F0A;font-size:18px;\">★<\u002Fspan><h2 style=\"margin:0;font:700 23px 'Segoe UI',Arial,sans-serif;\">Spotlight use cases this month<\u002Fh2><\u002Fdiv>\n        <span class=\"lnk\" onclick=\"{{ goLibrary }}\" style=\"font-size:13.5px;\">View all stories →<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-bottom:52px;\">\n        <sc-for list=\"{{ spotlight }}\" as=\"st\" hint-placeholder-count=\"3\">\n          <div class=\"card\" onclick=\"{{ st.open }}\" style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;overflow:hidden;\">\n            <div style=\"position:relative;height:130px;\">\n              <image-slot id=\"{{ st.slotId }}\" style=\"position:absolute;inset:0;width:100%;height:100%;\" shape=\"rect\" placeholder=\"Image\"><\u002Fimage-slot>\n              <span style=\"position:absolute;top:10px;left:10px;background:rgba(42,77,110,.92);color:#fff;font:600 10.5px 'Segoe UI',Arial,sans-serif;letter-spacing:.04em;padding:4px 9px;border-radius:3px;\">{{ st.deptUpper }}<\u002Fspan>\n              <sc-if value=\"{{ st.spotlight }}\"><span style=\"position:absolute;top:10px;right:10px;background:#FBF1DD;color:#B7791F;font:600 10.5px 'Segoe UI',Arial,sans-serif;padding:4px 9px;border-radius:3px;\">★ Spotlight<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"padding:16px 16px 18px;\">\n              <div style=\"font:600 10.5px 'Segoe UI',Arial,sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#4A78AB;margin-bottom:7px;\">{{ st.maturity }} · {{ st.toolType }}<\u002Fdiv>\n              <div style=\"font:700 15px/1.3 'Segoe UI',Arial,sans-serif;margin-bottom:8px;\">{{ st.title }}<\u002Fdiv>\n              <p style=\"margin:0 0 12px;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">{{ st.blurb }}<\u002Fp>\n              <div style=\"display:flex;gap:6px;flex-wrap:wrap;\">\n                <sc-for list=\"{{ st.impactArea }}\" as=\"tag\" hint-placeholder-count=\"2\"><span style=\"background:#F3F2F1;color:#5B6470;font:400 11px 'Segoe UI',Arial,sans-serif;padding:3px 8px;border-radius:3px;\">{{ tag }}<\u002Fspan><\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- participation -->\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;\">\n        <h2 style=\"margin:0;font:700 23px 'Segoe UI',Arial,sans-serif;\">Is your team flowing stories in?<\u002Fh2>\n        <span class=\"lnk\" onclick=\"{{ goMetrics }}\" style=\"font-size:13.5px;\">See full metrics →<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n        <sc-for list=\"{{ participation }}\" as=\"p\" hint-placeholder-count=\"5\">\n          <div style=\"flex:1;min-width:130px;background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:14px 16px;\">\n            <div style=\"font:600 13px 'Segoe UI',Arial,sans-serif;margin-bottom:8px;\">{{ p.dept }}<\u002Fdiv>\n            <span class=\"{{ p.cls }}\" style=\"display:inline-flex;align-items:center;gap:6px;font:600 12px 'Segoe UI',Arial,sans-serif;\"><span style=\"width:8px;height:8px;border-radius:50%;background:currentColor;\"><\u002Fspan>{{ p.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <!-- roles -->\n      <h2 style=\"margin:46px 0 16px;font:700 23px 'Segoe UI',Arial,sans-serif;\">Who does what<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;\">\n        <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:6px;padding:18px;\">\n          <div style=\"font-size:20px;margin-bottom:9px;\">👤<\u002Fdiv>\n          <div style=\"font:700 14px 'Segoe UI',Arial,sans-serif;margin-bottom:5px;\">Colleague / maker<\u002Fdiv>\n          <p style=\"margin:0;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Builds or uses a GPT or Skill, submits a short story, and confirms the draft.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:6px;padding:18px;\">\n          <div style=\"font-size:20px;margin-bottom:9px;\">⭐<\u002Fdiv>\n          <div style=\"font:700 14px 'Segoe UI',Arial,sans-serif;margin-bottom:5px;\">AI Enthusiast<\u002Fdiv>\n          <p style=\"margin:0;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Prompts stories, runs the Risk Assessor, reviews and tags, and escalates high-risk tools.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:6px;padding:18px;\">\n          <div style=\"font-size:20px;margin-bottom:9px;\">🛡<\u002Fdiv>\n          <div style=\"font:700 14px 'Segoe UI',Arial,sans-serif;margin-bottom:5px;\">AI Council<\u002Fdiv>\n          <p style=\"margin:0;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Reviews high-risk tools, sets policy thresholds, and makes approval decisions.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:6px;padding:18px;\">\n          <div style=\"font-size:20px;margin-bottom:9px;\">📈<\u002Fdiv>\n          <div style=\"font:700 14px 'Segoe UI',Arial,sans-serif;margin-bottom:5px;\">Leadership / sponsors<\u002Fdiv>\n          <p style=\"margin:0;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Use participation and spotlight stories to track adoption and remove blockers.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#2A4D6E;padding:26px 64px;display:flex;justify-content:space-between;align-items:center;\">\n      <span style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#bcd0e3;\">Need help? Contact your AI Enthusiast or the AI Council operations owner.<\u002Fspan>\n      <span style=\"font:600 13px 'Segoe UI',Arial,sans-serif;color:#fff;letter-spacing:.18em;\">HYATT<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== LIBRARY ===================== -->\n  <sc-if value=\"{{ isLibrary }}\">\n  <div style=\"padding:30px 48px 60px;\">\n    <div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;margin-bottom:14px;\"><span class=\"lnk\" onclick=\"{{ goHome }}\">Home<\u002Fspan> › Use Case Library<\u002Fdiv>\n    <sc-if value=\"{{ justAdded }}\">\n    <div style=\"background:#E7F3EC;border:1px solid #BFE0CC;border-radius:6px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;\">\n      <span style=\"color:#2E7D52;font-weight:700;\">✓<\u002Fspan>\n      <span style=\"font:400 13px 'Segoe UI',Arial,sans-serif;color:#1E5B3A;\">Thanks — your story was added as a <strong>draft<\u002Fstrong> and is awaiting Enthusiast review. <span style=\"color:#5B6470;\">(Demo: saved for this browser session.)<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;\">\n      <h1 style=\"margin:0;font:700 28px 'Segoe UI',Arial,sans-serif;\">Use Case Library<\u002Fh1>\n      <button class=\"spbtn\" onclick=\"{{ goSubmit }}\">＋ Submit a story<\u002Fbutton>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 22px;font:400 14px 'Segoe UI',Arial,sans-serif;color:#5B6470;max-width:680px;\">Searchable, celebrate-able GPT &amp; Skill stories across Hyatt. Filter by department, tool type, maturity, and more.<\u002Fp>\n\n    <!-- views -->\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;border-bottom:1px solid #E4E2E0;padding-bottom:14px;\">\n      <sc-for list=\"{{ viewChips }}\" as=\"v\" hint-placeholder-count=\"5\"><span class=\"chip {{ v.active }}\" onclick=\"{{ v.on }}\">{{ v.label }}<\u002Fspan><\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- filters -->\n    <div style=\"display:flex;gap:28px;flex-wrap:wrap;margin-bottom:22px;\">\n      <div><div style=\"font:600 11px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;margin-bottom:9px;\">Department<\u002Fdiv><div style=\"display:flex;gap:7px;flex-wrap:wrap;\"><sc-for list=\"{{ deptChips }}\" as=\"c\" hint-placeholder-count=\"5\"><span class=\"chip {{ c.active }}\" onclick=\"{{ c.on }}\">{{ c.label }}<\u002Fspan><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:600 11px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;margin-bottom:9px;\">Maturity level<\u002Fdiv><div style=\"display:flex;gap:7px;flex-wrap:wrap;\"><sc-for list=\"{{ matChips }}\" as=\"c\" hint-placeholder-count=\"4\"><span class=\"chip {{ c.active }}\" onclick=\"{{ c.on }}\">{{ c.label }}<\u002Fspan><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font:400 13px 'Segoe UI',Arial,sans-serif;color:#8A9097;margin-bottom:16px;\">{{ storyCount }} stories<\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px;\">\n      <sc-for list=\"{{ stories }}\" as=\"st\" hint-placeholder-count=\"6\">\n        <div class=\"card\" onclick=\"{{ st.open }}\" style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;overflow:hidden;display:flex;flex-direction:column;\">\n          <div style=\"height:8px;background:{{ st.bar }};\"><\u002Fdiv>\n          <div style=\"padding:18px 18px 18px;flex:1;display:flex;flex-direction:column;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;\">\n              <span style=\"background:#EAF1F8;color:#2A4D6E;font:600 10.5px 'Segoe UI',Arial,sans-serif;letter-spacing:.04em;padding:4px 9px;border-radius:3px;\">{{ st.deptUpper }}<\u002Fspan>\n              <sc-if value=\"{{ st.spotlight }}\"><span style=\"color:#C77F0A;font:600 11px 'Segoe UI',Arial,sans-serif;\">★ Spotlight<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"font:600 10.5px 'Segoe UI',Arial,sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#4A78AB;margin-bottom:7px;\">{{ st.maturity }} · {{ st.toolType }}<\u002Fdiv>\n            <div style=\"font:700 15.5px/1.3 'Segoe UI',Arial,sans-serif;margin-bottom:8px;\">{{ st.title }}<\u002Fdiv>\n            <p style=\"margin:0 0 14px;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;flex:1;\">{{ st.blurb }}<\u002Fp>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;border-top:1px solid #F1F0EF;padding-top:11px;\">\n              <span style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">{{ st.submitter }}<\u002Fspan>\n              <span class=\"{{ st.govCls }}\" style=\"font:600 10.5px 'Segoe UI',Arial,sans-serif;padding:3px 8px;border-radius:9px;\">{{ st.govLabel }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== STORY DETAIL ===================== -->\n  <sc-if value=\"{{ isStory }}\">\n  <div>\n    <div style=\"background:{{ activeStory.bar }};height:6px;\"><\u002Fdiv>\n    <div style=\"background:#fff;border-bottom:1px solid #E4E2E0;padding:26px 64px 28px;\">\n      <div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;margin-bottom:14px;\"><span class=\"lnk\" onclick=\"{{ goHome }}\">Home<\u002Fspan> › <span class=\"lnk\" onclick=\"{{ goLibrary }}\">Use Case Library<\u002Fspan> › Story<\u002Fdiv>\n      <div style=\"display:flex;gap:8px;margin-bottom:14px;\">\n        <span style=\"background:#EAF1F8;color:#2A4D6E;font:600 11px 'Segoe UI',Arial,sans-serif;padding:4px 10px;border-radius:3px;\">{{ activeStory.deptUpper }}<\u002Fspan>\n        <span style=\"background:#F3F2F1;color:#5B6470;font:600 11px 'Segoe UI',Arial,sans-serif;padding:4px 10px;border-radius:3px;\">{{ activeStory.maturity }}<\u002Fspan>\n        <span style=\"background:#F3F2F1;color:#5B6470;font:600 11px 'Segoe UI',Arial,sans-serif;padding:4px 10px;border-radius:3px;\">{{ activeStory.toolType }}<\u002Fspan>\n        <sc-if value=\"{{ activeStory.spotlight }}\"><span style=\"background:#FBF1DD;color:#B7791F;font:600 11px 'Segoe UI',Arial,sans-serif;padding:4px 10px;border-radius:3px;\">★ Spotlight<\u002Fspan><\u002Fsc-if>\n      <\u002Fdiv>\n      <h1 style=\"margin:0 0 8px;font:700 30px/1.2 'Segoe UI',Arial,sans-serif;max-width:820px;\">{{ activeStory.title }}<\u002Fh1>\n      <p style=\"margin:0;font:400 14px 'Segoe UI',Arial,sans-serif;color:#5B6470;\">{{ activeStory.team }} · Submitted by {{ activeStory.submitter }}<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 320px;gap:36px;padding:34px 64px 60px;align-items:start;\">\n      <div>\n        <div style=\"margin-bottom:26px;\"><div style=\"font:600 12px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;margin-bottom:8px;\">Problem<\u002Fdiv><p style=\"margin:0;font:400 15px/1.6 'Segoe UI',Arial,sans-serif;color:#333;\">{{ activeStory.problem }}<\u002Fp><\u002Fdiv>\n        <div style=\"margin-bottom:26px;\"><div style=\"font:600 12px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;margin-bottom:8px;\">What the tool does<\u002Fdiv><p style=\"margin:0;font:400 15px/1.6 'Segoe UI',Arial,sans-serif;color:#333;\">{{ activeStory.what }}<\u002Fp><\u002Fdiv>\n        <div style=\"margin-bottom:26px;\"><div style=\"font:600 12px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;margin-bottom:8px;\">Impact<\u002Fdiv>\n          <ul style=\"margin:0;padding-left:18px;\">\n            <sc-for list=\"{{ activeStory.impact }}\" as=\"b\" hint-placeholder-count=\"3\"><li style=\"font:400 15px/1.7 'Segoe UI',Arial,sans-serif;color:#333;\">{{ b }}<\u002Fli><\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div style=\"background:#F7FAFD;border:1px solid #E1EAF3;border-radius:5px;padding:18px 20px;\"><div style=\"font:600 12px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#4A78AB;margin-bottom:6px;\">How others can adapt it<\u002Fdiv><p style=\"margin:0;font:400 14.5px/1.6 'Segoe UI',Arial,sans-serif;color:#333;\">{{ activeStory.adapt }}<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:20px;margin-bottom:18px;\">\n          <div style=\"font:600 12px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;margin-bottom:14px;\">Details<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:13px;\">\n            <div><div style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Who is using it<\u002Fdiv><div style=\"font:600 13.5px 'Segoe UI',Arial,sans-serif;\">{{ activeStory.users }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Function<\u002Fdiv><div style=\"font:600 13.5px 'Segoe UI',Arial,sans-serif;\">{{ activeStory.func }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">AI Enthusiast owner<\u002Fdiv><div style=\"font:600 13.5px 'Segoe UI',Arial,sans-serif;\">{{ activeStory.owner }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Sharing consent<\u002Fdiv><div style=\"font:600 13.5px 'Segoe UI',Arial,sans-serif;\">{{ activeStory.consent }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:20px;\">\n          <div style=\"font:600 12px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;margin-bottom:12px;\">Governance link<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:14px;\">\n            <span class=\"{{ activeStory.govCls }}\" style=\"font:600 11px 'Segoe UI',Arial,sans-serif;padding:4px 10px;border-radius:10px;\">{{ activeStory.govLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ activeStory.hasRecord }}\">\n            <span class=\"lnk\" onclick=\"{{ activeStory.openRec }}\" style=\"font-size:13px;\">🔒 View governance record →<\u002Fspan>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ activeStory.noRecord }}\">\n            <span style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">No risk review required for this example.<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== SUBMIT FORM ===================== -->\n  <sc-if value=\"{{ isSubmit }}\">\n  <div style=\"padding:30px 64px 64px;\">\n    <div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;margin-bottom:14px;\"><span class=\"lnk\" onclick=\"{{ goHome }}\">Home<\u002Fspan> › Submit a story<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 300px;gap:40px;align-items:start;\">\n      <div>\n        <h1 style=\"margin:0 0 6px;font:700 28px 'Segoe UI',Arial,sans-serif;\">Share an AI use case<\u002Fh1>\n        <p style=\"margin:0 0 26px;font:400 14.5px/1.55 'Segoe UI',Arial,sans-serif;color:#5B6470;max-width:620px;\">Tell us about something useful you built or tried. This takes about 3 minutes — Power Automate turns it into a short draft and sends it back to you to confirm before anything is published.<\u002Fp>\n\n        <div style=\"display:flex;flex-direction:column;gap:20px;\">\n          <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">Your name and team<\u002Flabel><input class=\"fld\" value=\"{{ fName }}\" onchange=\"{{ onName }}\" placeholder=\"Who built or used this tool?\"><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">Tool name<\u002Flabel><input class=\"fld\" value=\"{{ fTool }}\" onchange=\"{{ onTool }}\" placeholder=\"A working name is fine\"><\u002Fdiv>\n            <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">Tool type<\u002Flabel><select class=\"fld\" value=\"{{ fType }}\" onchange=\"{{ onType }}\"><option>Custom GPT<\u002Foption><option>Skill<\u002Foption><option>Chained Skills<\u002Foption><option>Agent<\u002Foption><option>Other<\u002Foption><\u002Fselect><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">Department<\u002Flabel><select class=\"fld\" value=\"{{ fDept }}\" onchange=\"{{ onDept }}\"><option>Finance<\u002Foption><option>Revenue Management<\u002Foption><option>F&amp;B<\u002Foption><option>Marketing<\u002Foption><option>Operations<\u002Foption><option>HR<\u002Foption><\u002Fselect><\u002Fdiv>\n            <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">Maturity <span style=\"font-weight:400;color:#8A9097;\">— set from tool type<\u002Fspan><\u002Flabel><input class=\"fld\" value=\"{{ fMaturity }}\" readonly=\"\" style=\"background:#F3F2F1;color:#5B6470;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">What problem were you trying to solve?<\u002Flabel><textarea class=\"fld\" rows=\"3\" value=\"{{ fProblem }}\" onchange=\"{{ onProblem }}\" placeholder=\"Describe the task, pain point, or repeated work this helped with.\"><\u002Ftextarea><\u002Fdiv>\n          <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">What does the tool do?<\u002Flabel><textarea class=\"fld\" rows=\"3\" value=\"{{ fWhat }}\" onchange=\"{{ onWhat }}\" placeholder=\"What do you put in? What comes out? Avoid jargon.\"><\u002Ftextarea><\u002Fdiv>\n          <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">What is the impact? <span style=\"font-weight:400;color:#8A9097;\">An estimate is helpful.<\u002Fspan><\u002Flabel><textarea class=\"fld\" rows=\"2\" value=\"{{ fImpact }}\" onchange=\"{{ onImpact }}\" placeholder=\"How much time does it save? What would you have done manually?\"><\u002Ftextarea><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">Who else is using it?<\u002Flabel><input class=\"fld\" value=\"{{ fUsers }}\" onchange=\"{{ onUsers }}\" placeholder=\"Just you, your team, another group?\"><\u002Fdiv>\n            <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">Open to sharing at a meetup?<\u002Flabel><select class=\"fld\"><option>Maybe<\u002Foption><option>Yes<\u002Foption><option>No<\u002Foption><\u002Fselect><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">Can we publish a sanitized version?<\u002Flabel><select class=\"fld\"><option>Yes<\u002Foption><option>Needs review<\u002Foption><option>No<\u002Foption><\u002Fselect><\u002Fdiv>\n            <div><label style=\"font:600 13px 'Segoe UI',Arial,sans-serif;display:block;margin-bottom:6px;\">Anything we should not include?<\u002Flabel><input class=\"fld\" placeholder=\"Flag confidential info, names, screenshots…\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:center;margin-top:6px;\">\n            <button class=\"spbtn\" onclick=\"{{ submitStory }}\">Send for draft<\u002Fbutton>\n            <button class=\"spbtn2\" onclick=\"{{ goHome }}\">Cancel<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#F7FAFD;border:1px solid #E1EAF3;border-radius:6px;padding:22px;\">\n        <div style=\"font:700 14px 'Segoe UI',Arial,sans-serif;margin-bottom:14px;\">What happens next<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px;\">\n          <div style=\"display:flex;gap:11px;\"><div style=\"width:24px;height:24px;border-radius:50%;background:#4A78AB;color:#fff;font:700 12px 'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">1<\u002Fdiv><div style=\"font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#444;\">Power Automate formats your answers into a consistent draft.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;\"><div style=\"width:24px;height:24px;border-radius:50%;background:#4A78AB;color:#fff;font:700 12px 'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">2<\u002Fdiv><div style=\"font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#444;\">You confirm or edit it. Nothing publishes until you approve.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;\"><div style=\"width:24px;height:24px;border-radius:50%;background:#4A78AB;color:#fff;font:700 12px 'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">3<\u002Fdiv><div style=\"font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#444;\">Your AI Enthusiast reviews, tags, and routes for governance if needed.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px;background:#FBF1DD;border-radius:4px;padding:12px 14px;font:400 12px/1.5 'Segoe UI',Arial,sans-serif;color:#6B5410;\">Please keep it high-level — no guest data, colleague personal information, confidential financials, or screenshots with real data.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== GOVERNANCE LOG ===================== -->\n  <sc-if value=\"{{ isGov }}\">\n  <div style=\"padding:30px 48px 60px;\">\n    <div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;margin-bottom:14px;\"><span class=\"lnk\" onclick=\"{{ goHome }}\">Home<\u002Fspan> › Governance Log<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:6px;\">\n      <h1 style=\"margin:0;font:700 28px 'Segoe UI',Arial,sans-serif;\">Governance Log<\u002Fh1>\n      <span style=\"background:#E9EEF3;color:#2A4D6E;font:600 10.5px 'Segoe UI',Arial,sans-serif;letter-spacing:.05em;padding:4px 10px;border-radius:10px;\">🔒 RESTRICTED<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"background:#E9EEF3;border-left:4px solid #2A4D6E;border-radius:0 4px 4px 0;padding:11px 16px;margin:14px 0 22px;font:400 13px/1.5 'Segoe UI',Arial,sans-serif;color:#2A4D6E;max-width:760px;\">Restricted to AI Enthusiasts, the AI Council, and designated governance owners. Run the GPT Risk Assessor before logging a tool, then record the classification and routing outcome.<\u002Fdiv>\n\n    <!-- risk filter -->\n    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px;\">\n      <span style=\"font:600 11px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;\">Risk<\u002Fspan>\n      <sc-for list=\"{{ riskChips }}\" as=\"c\" hint-placeholder-count=\"4\"><span class=\"chip {{ c.active }}\" onclick=\"{{ c.on }}\">{{ c.label }}<\u002Fspan><\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;overflow:hidden;\">\n      <div style=\"display:flex;align-items:center;gap:16px;padding:10px 20px;background:#FAFAFA;border-bottom:1px solid #EDEBE9;color:#8A9097;font:600 10.5px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.05em;\">\n        <span style=\"flex:.7;\">Tool ID<\u002Fspan><span style=\"flex:2.2;\">Tool<\u002Fspan><span style=\"flex:1.2;\">Department<\u002Fspan><span style=\"flex:1;\">Risk<\u002Fspan><span style=\"flex:1.8;\">Routing<\u002Fspan><span style=\"flex:1.5;\">Status<\u002Fspan>\n      <\u002Fdiv>\n      <sc-for list=\"{{ govRows }}\" as=\"g\" hint-placeholder-count=\"5\">\n        <div class=\"rowh\" onclick=\"{{ g.open }}\" style=\"display:flex;align-items:center;gap:16px;padding:14px 20px;border-bottom:1px solid #F1F0EF;cursor:pointer;\">\n          <span style=\"flex:.7;font:600 12px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">{{ g.id }}<\u002Fspan>\n          <span style=\"flex:2.2;\"><span style=\"font:600 13.5px 'Segoe UI',Arial,sans-serif;display:block;\">{{ g.name }}<\u002Fspan><span style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">{{ g.type }}<\u002Fspan><\u002Fspan>\n          <span style=\"flex:1.2;font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#5B6470;\">{{ g.dept }}<\u002Fspan>\n          <span style=\"flex:1;\"><span class=\"{{ g.riskCls }}\" style=\"font:600 11px 'Segoe UI',Arial,sans-serif;padding:3px 10px;border-radius:11px;\">{{ g.risk }}<\u002Fspan><\u002Fspan>\n          <span style=\"flex:1.8;font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#5B6470;\">{{ g.routing }}<\u002Fspan>\n          <span style=\"flex:1.5;font:600 12.5px 'Segoe UI',Arial,sans-serif;color:{{ g.statusColor }};\">{{ g.status }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== RECORD DETAIL ===================== -->\n  <sc-if value=\"{{ isRecord }}\">\n  <div style=\"padding:30px 64px 60px;\">\n    <div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;margin-bottom:14px;\"><span class=\"lnk\" onclick=\"{{ goHome }}\">Home<\u002Fspan> › <span class=\"lnk\" onclick=\"{{ goGov }}\">Governance Log<\u002Fspan> › {{ activeRecord.id }}<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:6px;\">\n      <h1 style=\"margin:0;font:700 28px 'Segoe UI',Arial,sans-serif;\">{{ activeRecord.name }}<\u002Fh1>\n      <span class=\"{{ activeRecord.riskCls }}\" style=\"font:600 12px 'Segoe UI',Arial,sans-serif;padding:5px 12px;border-radius:12px;\">{{ activeRecord.risk }} risk<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"margin:0 0 26px;font:400 13.5px 'Segoe UI',Arial,sans-serif;color:#5B6470;\">{{ activeRecord.id }} · {{ activeRecord.type }} · {{ activeRecord.dept }}<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:1fr 330px;gap:34px;align-items:start;\">\n      <div>\n        <div style=\"font:600 12px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;margin-bottom:8px;\">GPT Risk Assessor output<\u002Fdiv>\n        <div style=\"background:#1F2D3D;border-radius:6px;padding:20px 22px;margin-bottom:26px;\">\n          <pre style=\"margin:0;white-space:pre-wrap;font:400 13px/1.7 'Consolas','Segoe UI',monospace;color:#d6e2ee;\">{{ activeRecord.assessor }}<\u002Fpre>\n        <\u002Fdiv>\n\n        <div style=\"font:600 12px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;margin-bottom:10px;\">Conditions &amp; mitigations<\u002Fdiv>\n        <ul style=\"margin:0 0 26px;padding-left:18px;\">\n          <sc-for list=\"{{ activeRecord.conditions }}\" as=\"c\" hint-placeholder-count=\"3\"><li style=\"font:400 14px/1.7 'Segoe UI',Arial,sans-serif;color:#333;\">{{ c }}<\u002Fli><\u002Fsc-for>\n        <\u002Ful>\n\n        <sc-if value=\"{{ activeRecord.escalated }}\">\n          <div style=\"background:#FBE9E8;border:1px solid #F3C9C6;border-radius:6px;padding:16px 20px;\">\n            <div style=\"font:600 13px 'Segoe UI',Arial,sans-serif;color:#C23934;margin-bottom:8px;\">⚑ Escalation triggers present<\u002Fdiv>\n            <ul style=\"margin:0;padding-left:18px;\">\n              <sc-for list=\"{{ activeRecord.triggers }}\" as=\"t\" hint-placeholder-count=\"2\"><li style=\"font:400 13.5px/1.6 'Segoe UI',Arial,sans-serif;color:#7A2521;\">{{ t }}<\u002Fli><\u002Fsc-for>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div>\n        <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:20px;margin-bottom:18px;\">\n          <div style=\"font:600 12px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;margin-bottom:14px;\">Routing &amp; status<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:13px;\">\n            <div><div style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Current status<\u002Fdiv><div style=\"font:600 14px 'Segoe UI',Arial,sans-serif;color:{{ activeRecord.statusColor }};\">{{ activeRecord.status }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Routing outcome<\u002Fdiv><div style=\"font:600 13.5px 'Segoe UI',Arial,sans-serif;\">{{ activeRecord.routing }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Decision by<\u002Fdiv><div style=\"font:600 13.5px 'Segoe UI',Arial,sans-serif;\">{{ activeRecord.decider }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Reviewer<\u002Fdiv><div style=\"font:600 13.5px 'Segoe UI',Arial,sans-serif;\">{{ activeRecord.reviewer }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Date of review<\u002Fdiv><div style=\"font:600 13.5px 'Segoe UI',Arial,sans-serif;\">{{ activeRecord.date }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font:400 11.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Next review<\u002Fdiv><div style=\"font:600 13.5px 'Segoe UI',Arial,sans-serif;\">{{ activeRecord.nextReview }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:20px;\">\n          <div style=\"font:600 12px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.07em;color:#8A9097;margin-bottom:12px;\">Linked story<\u002Fdiv>\n          <sc-if value=\"{{ activeRecord.hasStory }}\"><span class=\"lnk\" onclick=\"{{ activeRecord.openStory }}\" style=\"font-size:13px;\">📖 {{ activeRecord.storyTitle }} →<\u002Fspan><\u002Fsc-if>\n          <sc-if value=\"{{ activeRecord.noStory }}\"><span style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">No published story linked yet.<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== ENABLEMENT ===================== -->\n  <sc-if value=\"{{ isEnablement }}\">\n  <div style=\"padding:30px 64px 60px;\">\n    <div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;margin-bottom:14px;\"><span class=\"lnk\" onclick=\"{{ goHome }}\">Home<\u002Fspan> › Enablement<\u002Fdiv>\n    <h1 style=\"margin:0 0 6px;font:700 28px 'Segoe UI',Arial,sans-serif;\">Enablement<\u002Fh1>\n    <p style=\"margin:0 0 22px;font:400 14px/1.55 'Segoe UI',Arial,sans-serif;color:#5B6470;max-width:720px;\">Everything a colleague needs to build well — required training, reusable templates, and approved building blocks. The CoE provides the paved path; teams build on it.<\u002Fp>\n\n    <!-- training gate -->\n    <div style=\"background:#EAF1F8;border:1px solid #CFE0F0;border-radius:6px;padding:20px 22px;margin:0 0 32px;display:flex;align-items:center;gap:18px;\">\n      <div style=\"width:46px;height:46px;border-radius:8px;background:#4A78AB;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;\">🎓<\u002Fdiv>\n      <div style=\"flex:1;\">\n        <div style=\"font:700 15px 'Segoe UI',Arial,sans-serif;margin-bottom:3px;\">Before you build: AI Foundations &amp; Responsible Use<\u002Fdiv>\n        <p style=\"margin:0;font:400 13px/1.5 'Segoe UI',Arial,sans-serif;color:#445;\">Access to create and publish custom GPTs and Skills in ChatGPT Enterprise is granted once this short training is complete.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"text-align:right;flex-shrink:0;\">\n        <div style=\"font:600 12px 'Segoe UI',Arial,sans-serif;color:#2E7D52;margin-bottom:8px;\">✓ You're cleared to build<\u002Fdiv>\n        <button class=\"spbtn2\" style=\"padding:8px 16px;font-size:12.5px;\">Review training<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- templates -->\n    <h2 style=\"margin:0 0 14px;font:700 19px 'Segoe UI',Arial,sans-serif;\">Templates &amp; starters<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:36px;\">\n      <div class=\"card\" style=\"background:#fff;border:1px solid #E4E2E0;border-radius:6px;padding:20px;\">\n        <div style=\"font-size:22px;margin-bottom:10px;\">💬<\u002Fdiv>\n        <div style=\"font:700 15px 'Segoe UI',Arial,sans-serif;margin-bottom:6px;\">Prompt pattern library<\u002Fdiv>\n        <p style=\"margin:0 0 12px;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Vetted prompt structures for analysis, drafting, and summarizing — copy and adapt.<\u002Fp>\n        <span class=\"lnk\" style=\"font-size:12.5px;\">Open →<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"background:#fff;border:1px solid #E4E2E0;border-radius:6px;padding:20px;\">\n        <div style=\"font-size:22px;margin-bottom:10px;\">🧩<\u002Fdiv>\n        <div style=\"font:700 15px 'Segoe UI',Arial,sans-serif;margin-bottom:6px;\">Skill blueprint<\u002Fdiv>\n        <p style=\"margin:0 0 12px;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">A starter scaffold for turning a recurring task into a reusable Skill.<\u002Fp>\n        <span class=\"lnk\" style=\"font-size:12.5px;\">Download →<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"background:#fff;border:1px solid #E4E2E0;border-radius:6px;padding:20px;\">\n        <div style=\"font-size:22px;margin-bottom:10px;\">🤖<\u002Fdiv>\n        <div style=\"font:700 15px 'Segoe UI',Arial,sans-serif;margin-bottom:6px;\">Custom GPT starter<\u002Fdiv>\n        <p style=\"margin:0 0 12px;font:400 12.5px/1.5 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Configuration checklist and guardrails for standing up a new internal GPT.<\u002Fp>\n        <span class=\"lnk\" style=\"font-size:12.5px;\">Open →<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n      <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:6px;padding:22px;\">\n        <div style=\"font:700 15px 'Segoe UI',Arial,sans-serif;margin-bottom:14px;\">Approved building blocks<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"color:#2E7D52;\">✓<\u002Fspan><span style=\"font:400 13.5px 'Segoe UI',Arial,sans-serif;color:#333;\">Approved data sources &amp; connectors<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"color:#2E7D52;\">✓<\u002Fspan><span style=\"font:400 13.5px 'Segoe UI',Arial,sans-serif;color:#333;\">Sanitized sample datasets for testing<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"color:#2E7D52;\">✓<\u002Fspan><span style=\"font:400 13.5px 'Segoe UI',Arial,sans-serif;color:#333;\">Hyatt brand &amp; tone guidelines<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"color:#C23934;\">⊘<\u002Fspan><span style=\"font:400 13.5px 'Segoe UI',Arial,sans-serif;color:#333;\">Sensitive-data do-not-use list<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:6px;padding:22px;\">\n        <div style=\"font:700 15px 'Segoe UI',Arial,sans-serif;margin-bottom:14px;\">Get help<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px;\">\n          <div><div style=\"font:600 13px 'Segoe UI',Arial,sans-serif;\">AI Enthusiast office hours<\u002Fdiv><div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Weekly, Thursdays — drop in with a tool idea.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font:600 13px 'Segoe UI',Arial,sans-serif;\">#ai-enthusiasts community<\u002Fdiv><div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">Ask questions and share prompts that worked.<\u002Fdiv><\u002Fdiv>\n          <div><span class=\"lnk\" onclick=\"{{ goGov }}\" style=\"font-size:13px;\">🛡 Submit a tool for risk review →<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== METRICS ===================== -->\n  <sc-if value=\"{{ isMetrics }}\">\n  <div style=\"padding:30px 64px 60px;\">\n    <div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#8A9097;margin-bottom:14px;\"><span class=\"lnk\" onclick=\"{{ goHome }}\">Home<\u002Fspan> › Metrics<\u002Fdiv>\n    <h1 style=\"margin:0 0 6px;font:700 28px 'Segoe UI',Arial,sans-serif;\">Adoption &amp; governance metrics<\u002Fh1>\n    <p style=\"margin:0 0 26px;font:400 14px 'Segoe UI',Arial,sans-serif;color:#5B6470;max-width:680px;\">The near-term signal is intentionally simple: did each Enthusiast group flow at least one story or governance record this period?<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:34px;\">\n      <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:18px 20px;\"><div style=\"font:700 30px 'Segoe UI',Arial,sans-serif;color:#2A4D6E;\">5/7<\u002Fdiv><div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Departments participating<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:18px 20px;\"><div style=\"font:700 30px 'Segoe UI',Arial,sans-serif;color:#2A4D6E;\">24<\u002Fdiv><div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Stories in the library<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:18px 20px;\"><div style=\"font:700 30px 'Segoe UI',Arial,sans-serif;color:#C77F0A;\">6<\u002Fdiv><div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#5B6470;\">Spotlight candidates<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:18px 20px;\"><div style=\"font:700 30px 'Segoe UI',Arial,sans-serif;color:#C23934;\">1<\u002Fdiv><div style=\"font:400 12.5px 'Segoe UI',Arial,sans-serif;color:#5B6470;\">High-risk in Council queue<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h2 style=\"margin:0 0 14px;font:700 19px 'Segoe UI',Arial,sans-serif;\">Department participation — this period<\u002Fh2>\n    <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;overflow:hidden;margin-bottom:34px;\">\n      <div style=\"display:flex;align-items:center;padding:10px 20px;background:#FAFAFA;border-bottom:1px solid #EDEBE9;color:#8A9097;font:600 10.5px 'Segoe UI',Arial,sans-serif;text-transform:uppercase;letter-spacing:.05em;\">\n        <span style=\"flex:2;\">Enthusiast group<\u002Fspan><span style=\"flex:1;text-align:center;\">Library entry<\u002Fspan><span style=\"flex:1;text-align:center;\">Governance entry<\u002Fspan><span style=\"flex:1.6;\">Follow-up<\u002Fspan>\n      <\u002Fdiv>\n      <sc-for list=\"{{ matrix }}\" as=\"m\" hint-placeholder-count=\"7\">\n        <div style=\"display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid #F1F0EF;\">\n          <span style=\"flex:2;font:600 12.5px 'Segoe UI',Arial,sans-serif;\">{{ m.dept }}<\u002Fspan>\n          <span style=\"flex:1;text-align:center;font:600 12px 'Segoe UI',Arial,sans-serif;color:{{ m.libColor }};\">{{ m.lib }}<\u002Fspan>\n          <span style=\"flex:1;text-align:center;font:600 12px 'Segoe UI',Arial,sans-serif;color:{{ m.govColor }};\">{{ m.gov }}<\u002Fspan>\n          <span style=\"flex:1.6;font:400 12px 'Segoe UI',Arial,sans-serif;color:#8A9097;\">{{ m.follow }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <h2 style=\"margin:0 0 14px;font:700 19px 'Segoe UI',Arial,sans-serif;\">Later-stage metrics<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px;\">\n      <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:16px 18px;font:400 13.5px/1.5 'Segoe UI',Arial,sans-serif;color:#444;\">Volume of stories by department <span style=\"color:#8A9097;\">— after binary signal is stable<\u002Fspan><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:16px 18px;font:400 13.5px/1.5 'Segoe UI',Arial,sans-serif;color:#444;\">Share of stories with quantified impact<\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:16px 18px;font:400 13.5px/1.5 'Segoe UI',Arial,sans-serif;color:#444;\">Submissions by maturity level<\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #E4E2E0;border-radius:5px;padding:16px 18px;font:400 13.5px/1.5 'Segoe UI',Arial,sans-serif;color:#444;\">High-risk queue age &amp; time to Council decision<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { screen:'home', dept:'All', maturity:'All', view:'Browse all', risk:'All', activeStoryId:'s1', activeRecordId:'g1', userStories:[], form:{}, justAdded:false };\n\n  STORIES = [\n    { id:'s1', dept:'Finance', toolType:'Chained Skills', maturity:'Advanced', func:'Analysis / Reporting',\n      title:'Finance custom GPT combines multiple team Skills into one workflow', spotlight:true,\n      submitter:'Gaurav Sinha', owner:'R. Lehman', team:'Finance', users:'Finance team (count to be confirmed)', consent:'Yes',\n      blurb:'Faster workflow completion and easier adoption — teammates no longer need to know where each Skill lives.',\n      problem:'Several teammates had started using individual Skills, but the workflow still required colleagues to know where each Skill lived and how to sequence them. This made adoption harder for colleagues still learning ChatGPT Enterprise.',\n      what:'A custom GPT chains multiple Skills into one guided workflow. A teammate starts with a finance task or request, and the GPT helps route the work through the relevant Skills to produce a more complete output.',\n      impact:['Faster workflow completion across the team','Easier adoption for colleagues still learning the toolset','More consistent reuse of existing Skills'],\n      adapt:'Any team already using several point Skills can wrap them in a single guided GPT so colleagues do not have to remember the sequence.',\n      impactArea:['Time savings','Process standardization'], govStatus:'Linked', recordId:'g1' },\n    { id:'s2', dept:'Revenue Management', toolType:'Skill', maturity:'Intermediate', func:'Reporting',\n      title:'Weekly inputs turned into a standardized analysis summary', spotlight:false,\n      submitter:'A. Okafor', owner:'R. Lehman', team:'Revenue Management', users:'Revenue Management pod (~6)', consent:'Yes',\n      blurb:'A repeatable Skill that converts recurring weekly inputs into one consistent reporting format.',\n      problem:'Weekly performance summaries were assembled by hand and varied in format from analyst to analyst, making them slow to produce and hard to compare.',\n      what:'A Skill takes the standard weekly inputs and returns a consistent, formatted analysis summary ready for review.',\n      impact:['Cuts summary prep from roughly an hour to minutes','Output format is consistent across analysts','Easier week-over-week comparison'],\n      adapt:'Teams with any recurring, templated report can encode the structure once as a Skill.',\n      impactArea:['Reporting','Quality improvement'], govStatus:'Linked', recordId:'g2' },\n    { id:'s3', dept:'Marketing', toolType:'Custom GPT', maturity:'Beginner', func:'Communication',\n      title:'GPT drafts first-pass campaign options and compares tone', spotlight:false,\n      submitter:'J. Reyes', owner:'M. Donovan', team:'Marketing', users:'Brand & campaigns team', consent:'Yes',\n      blurb:'Speeds up early creative exploration with quick first-draft variants to react to.',\n      problem:'Getting from a brief to a first set of creative directions took time, and early drafts were inconsistent in tone.',\n      what:'A custom GPT drafts first-pass campaign options and produces tone variants the team can compare and react to.',\n      impact:['Faster start from brief to first drafts','Easy tone comparison early in the process'],\n      adapt:'Useful for any team that needs quick, disposable first drafts to react to rather than start from blank.',\n      impactArea:['Communication'], govStatus:'Linked', recordId:'g3' },\n    { id:'s4', dept:'F&B', toolType:'Skill', maturity:'Intermediate', func:'Planning',\n      title:'Event sheets turned into prep checklists for the kitchen', spotlight:false,\n      submitter:'L. Bianchi', owner:'M. Donovan', team:'Food & Beverage', users:'Banquet kitchen team', consent:'Maybe',\n      blurb:'Converts event order details into a standardized prep checklist the team can run from.',\n      problem:'Translating event order sheets into kitchen prep lists was manual and easy to get inconsistent across shifts.',\n      what:'A Skill reads the standardized event details and returns a structured prep checklist organized by station.',\n      impact:['Less manual translation of event sheets','More consistent prep across shifts'],\n      adapt:'Any operation that turns a standard order document into a task list can templatize it.',\n      impactArea:['Process standardization'], govStatus:'Needed', recordId:null },\n    { id:'s5', dept:'Operations', toolType:'Chained Skills', maturity:'Advanced', func:'Analysis',\n      title:'Shift handover notes summarized into a next-shift briefing', spotlight:false,\n      submitter:'D. Mwangi', owner:'R. Lehman', team:'Operations', users:'Front office leadership', consent:'Yes',\n      blurb:'Chains summarization and formatting Skills into one next-shift briefing.',\n      problem:'Handover notes were long and inconsistent, so incoming shift leads spent time piecing together what mattered.',\n      what:'A chained workflow summarizes raw handover notes and formats a concise briefing for the next shift.',\n      impact:['Faster, more consistent shift handovers','Less time re-reading long raw notes'],\n      adapt:'Works wherever long running notes need a consistent, skimmable summary.',\n      impactArea:['Time savings','Quality improvement'], govStatus:'Pending', recordId:'g4' },\n    { id:'s6', dept:'HR', toolType:'Skill', maturity:'Beginner', func:'Communication',\n      title:'First-pass job descriptions drafted from a short role brief', spotlight:false,\n      submitter:'S. Patel', owner:'M. Donovan', team:'Human Resources', users:'Talent acquisition', consent:'Needs review',\n      blurb:'Turns a short role brief into a first-draft job description to edit.',\n      problem:'Writing job descriptions from scratch was slow and the first drafts varied a lot in structure.',\n      what:'A Skill takes a short role brief and returns a structured first-draft job description for a recruiter to refine.',\n      impact:['Faster first drafts for recruiters','More consistent JD structure'],\n      adapt:'Any templated document that starts from a short brief is a good candidate.',\n      impactArea:['Time savings'], govStatus:'Needed', recordId:'g5' }\n  ];\n\n  GOV = [\n    { id:'TID-014', sid:'g1', name:'Finance Workflow GPT', type:'Chained Skills', dept:'Finance', risk:'Medium',\n      routing:'Approved with conditions', status:'Approved with conditions', decider:'AI Enthusiast', reviewer:'R. Lehman',\n      date:'12 Jun 2026', nextReview:'12 Dec 2026', storyId:'s1',\n      assessor:'CLASSIFICATION: Medium\\nData sensitivity: Internal finance context, no guest/PII\\nAutonomy: Assists drafting; human reviews all output\\nExternal exposure: None — runs in ChatGPT Enterprise\\nMaterial decisioning: No autonomous decisions\\nRecommendation: Self-approve with conditions',\n      conditions:['Human review required on all generated output before use','Inputs limited to non-confidential, internal finance context','Pilot scope: Finance team only until next review'],\n      escalated:false, triggers:[] },\n    { id:'TID-009', sid:'g2', name:'RM Analysis Skill', type:'Skill', dept:'Revenue Management', risk:'Low',\n      routing:'Self-approved', status:'Approved', decider:'AI Enthusiast', reviewer:'R. Lehman',\n      date:'04 Jun 2026', nextReview:'—', storyId:'s2',\n      assessor:'CLASSIFICATION: Low\\nData sensitivity: Internal performance inputs, no PII\\nAutonomy: Formatting only\\nExternal exposure: None\\nMaterial decisioning: No\\nRecommendation: Self-approve after Enthusiast review',\n      conditions:['Continue to use sanitized inputs only','No external publication of raw outputs'],\n      escalated:false, triggers:[] },\n    { id:'TID-021', sid:'g3', name:'Marketing Tone GPT', type:'Custom GPT', dept:'Marketing', risk:'Low',\n      routing:'Self-approved', status:'Approved', decider:'AI Enthusiast', reviewer:'M. Donovan',\n      date:'18 Jun 2026', nextReview:'—', storyId:'s3',\n      assessor:'CLASSIFICATION: Low\\nData sensitivity: Non-confidential creative briefs\\nAutonomy: Drafting only; human selects\\nExternal exposure: None pre-publication\\nMaterial decisioning: No\\nRecommendation: Self-approve after Enthusiast review',\n      conditions:['Final creative always reviewed by a human before publication'],\n      escalated:false, triggers:[] },\n    { id:'TID-027', sid:'g4', name:'Guest Sentiment Analyzer', type:'Agent', dept:'Operations', risk:'High',\n      routing:'Escalated to Council', status:'Pending Council Review', decider:'AI Council', reviewer:'R. Lehman',\n      date:'22 Jun 2026', nextReview:'On decision', storyId:'s5',\n      assessor:'CLASSIFICATION: High\\nData sensitivity: May process guest feedback containing personal data\\nAutonomy: Agentic — proposes actions on guest cases\\nExternal exposure: Connects to a review feed outside approved scope\\nMaterial decisioning: Could influence guest-facing follow-up\\nRecommendation: Escalate to AI Council before any reuse',\n      conditions:['No broad rollout until Council decision is logged','Pilot only if Council explicitly permits'],\n      escalated:true, triggers:['Guest personal data may be processed or exposed','Influences material guest-facing follow-up decisions','Connects to an external feed not already approved'] },\n    { id:'TID-031', sid:'g5', name:'HR JD Drafter', type:'Skill', dept:'HR', risk:'Medium',\n      routing:'Approved with conditions', status:'Approved with conditions', decider:'AI Enthusiast', reviewer:'M. Donovan',\n      date:'24 Jun 2026', nextReview:'24 Dec 2026', storyId:'s6',\n      assessor:'CLASSIFICATION: Medium\\nData sensitivity: Role briefs, no colleague PII\\nAutonomy: Drafting only\\nExternal exposure: None\\nMaterial decisioning: Informs employment-related content\\nRecommendation: Self-approve with conditions; HR sign-off on final JDs',\n      conditions:['Final job descriptions reviewed and approved by HR','No colleague personal data in inputs'],\n      escalated:false, triggers:[] }\n  ];\n\n  riskStyle(r){ return r==='Low'?'rk-low':r==='Medium'?'rk-med':r==='High'?'rk-high':'rk-low'; }\n  statusColorFor(s){ return s.indexOf('Pending')>=0||s.indexOf('Council')>=0 ? '#C23934' : (s.indexOf('conditions')>=0 ? '#B7791F' : '#2E7D52'); }\n  govLabelFor(g){ return g==='Linked'?'🔗 Linked':g==='Needed'?'Risk review needed':g==='Pending'?'Pending review':'Not needed'; }\n  govClsFor(g){ return g==='Linked'?'gv-linked':g==='Pending'?'gv-pending':'gv-needed'; }\n  barFor(d){ const m={Finance:'#4A78AB','Revenue Management':'#006E96','F&B':'#C77F0A',Marketing:'#AD5F7D',Operations:'#2A4D6E',HR:'#3E7C5A'}; return m[d]||'#4A78AB'; }\n\n  renderVals(){\n    const s=this.state;\n    const go=(screen)=>()=>this.setState({screen,justAdded:false});\n    const openStory=(id)=>this.setState({screen:'story',activeStoryId:id});\n    const openRecord=(id)=>this.setState({screen:'record',activeRecordId:id});\n\n    const decorate=(st,i)=>({\n      ...st, deptUpper:st.dept.toUpperCase(),\n      bar:this.barFor(st.dept),\n      slotId:'sp-'+st.id,\n      govLabel:this.govLabelFor(st.govStatus), govCls:this.govClsFor(st.govStatus),\n      open:()=>openStory(st.id)\n    });\n    const coreDecorated=this.STORIES.map(decorate);\n    const userDecorated=(s.userStories||[]).map(decorate);\n    const allDecorated=[...userDecorated,...coreDecorated];\n\n    let filtered=allDecorated.filter(st=>\n      (s.dept==='All'||st.dept===s.dept) &&\n      (s.maturity==='All'||st.maturity===s.maturity) &&\n      (s.view!=='Spotlight'||st.spotlight) &&\n      (s.view!=='Beginner examples'||st.maturity==='Beginner') &&\n      (s.view!=='Advanced / chained'||st.maturity==='Advanced'||st.toolType==='Chained Skills') &&\n      (s.view!=='Needs review'||st.govStatus==='Needed')\n    );\n\n    const mkChips=(vals,cur,key)=>vals.map(v=>({label:v,active:cur===v?'active':'',on:()=>this.setState({[key]:v})}));\n    const views=['Browse all','Spotlight','Beginner examples','Advanced / chained','Needs review'];\n\n    const aStory=allDecorated.find(x=>x.id===s.activeStoryId)||allDecorated[0];\n    const aStoryFull={...aStory,\n      hasRecord:!!aStory.recordId, noRecord:!aStory.recordId,\n      openRec:aStory.recordId?(()=>openRecord(aStory.recordId)):(()=>{})\n    };\n\n    const govDecorated=this.GOV.map(g=>({...g,\n      riskCls:this.riskStyle(g.risk), statusColor:this.statusColorFor(g.status),\n      open:()=>openRecord(g.sid)\n    }));\n    let govFiltered=govDecorated.filter(g=> s.risk==='All'||g.risk===s.risk );\n\n    const aRec=govDecorated.find(x=>x.sid===s.activeRecordId)||govDecorated[0];\n    const linkedStory=this.STORIES.find(x=>x.id===aRec.storyId);\n    const aRecFull={...aRec,\n      hasStory:!!linkedStory, noStory:!linkedStory,\n      storyTitle:linkedStory?linkedStory.title:'',\n      openStory:linkedStory?(()=>openStory(linkedStory.id)):(()=>{})\n    };\n\n    const part=[\n      {dept:'Finance',yes:true},{dept:'Revenue Mgmt',yes:true},{dept:'F&B',yes:false},\n      {dept:'Marketing',yes:true},{dept:'Operations',yes:false}\n    ].map(p=>({dept:p.dept,label:p.yes?'Yes':'No',cls:p.yes?'pt-yes':'pt-no'}));\n\n    const matrix=[\n      {dept:'Finance',lib:'● Yes',libC:'#2E7D52',gov:'● Yes',govC:'#2E7D52',follow:'—'},\n      {dept:'Revenue Management',lib:'● Yes',libC:'#2E7D52',gov:'● Yes',govC:'#2E7D52',follow:'—'},\n      {dept:'F&B',lib:'● No',libC:'#C23934',gov:'● No',govC:'#C23934',follow:'Enthusiast to prompt'},\n      {dept:'Marketing',lib:'● Yes',libC:'#2E7D52',gov:'● No',govC:'#C23934',follow:'Risk review pending'},\n      {dept:'RAMP',lib:'● No',libC:'#C23934',gov:'● No',govC:'#C23934',follow:'Not yet engaged'},\n      {dept:'Operations',lib:'● Yes',libC:'#2E7D52',gov:'● Yes',govC:'#2E7D52',follow:'—'},\n      {dept:'HR',lib:'● Yes',libC:'#2E7D52',gov:'● Yes',govC:'#2E7D52',follow:'—'}\n    ].map(m=>({dept:m.dept,lib:m.lib,libColor:m.libC,gov:m.gov,govColor:m.govC,follow:m.follow}));\n\n    const f=s.form||{};\n    const matFromType=(t)=>(t==='Chained Skills'||t==='Agent')?'Advanced':(t==='Skill'||t==='Custom GPT')?'Intermediate':'Beginner';\n    const setF=(k)=>(e)=>this.setState({form:{...(this.state.form||{}),[k]:e.target.value}});\n    const submitStory=()=>{\n      const ff=this.state.form||{};\n      const type=ff.type||'Custom GPT';\n      const title=(ff.tool&&ff.tool.trim())||(ff.problem&&ff.problem.trim().slice(0,60))||'Untitled AI tool';\n      const dept=ff.dept||'Finance';\n      const story={\n        id:'u'+Date.now(), dept, toolType:type, maturity:matFromType(type), func:'\\u2014',\n        title, spotlight:false,\n        submitter:(ff.name&&ff.name.trim())||'You', owner:'Unassigned', team:dept,\n        users:(ff.users&&ff.users.trim())||'\\u2014', consent:'Needs review',\n        blurb:(ff.problem&&ff.problem.trim())||'Submitted via the story form.',\n        problem:(ff.problem&&ff.problem.trim())||'\\u2014',\n        what:(ff.what&&ff.what.trim())||'\\u2014',\n        impact:[(ff.impact&&ff.impact.trim())||'Impact estimate to be confirmed.'],\n        adapt:'\\u2014', impactArea:['Time savings'], govStatus:'Needed', recordId:null\n      };\n      this.setState({userStories:[story,...(this.state.userStories||[])], form:{}, screen:'library', justAdded:true, view:'Browse all', dept:'All', maturity:'All'});\n    };\n\n    return {\n      isHome:s.screen==='home', isLibrary:s.screen==='library', isStory:s.screen==='story',\n      isSubmit:s.screen==='submit', isGov:s.screen==='gov', isRecord:s.screen==='record', isMetrics:s.screen==='metrics',\n      isEnablement:s.screen==='enablement',\n      homeActive:s.screen==='home'?'active':'', libActive:s.screen==='library'?'active':'',\n      govActive:(s.screen==='gov'||s.screen==='record')?'active':'', metActive:s.screen==='metrics'?'active':'',\n      enbActive:s.screen==='enablement'?'active':'',\n      goHome:go('home'), goLibrary:go('library'), goSubmit:go('submit'), goGov:go('gov'), goMetrics:go(
